<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reading Gate - Demo Publishing</title>
  <link rel="stylesheet" href="rg_track_demo.css">
</head>
<body>
  <aside class="sidebar">
    <div class="logo"><img src="/image/logo.png" alt=""></div>
    <nav>
      <div class="nav-item active"><span class="nav-icon"><img src="/image/menu-icon-1.png" alt=""></span>MY CLASS</div>
      <div class="nav-item"><img src="/image/menu-icon-2.png" alt=""></span>LIBRARY</div>
      <div class="nav-item"><img src="/image/menu-icon-3.png" alt=""></span>MOVIES</div>
      <div class="nav-item"><img src="/image/menu-icon-4.png" alt=""></span>MY PAGE</div>
      <div class="divider"></div>
      <div class="nav-item"><img src="/image/menu-icon-5.png" alt=""></span>GAME</div>
      <div class="nav-item"><img src="/image/menu-icon-6.png" alt=""></span>DUBBING</div>
      <div class="divider"></div>
      <div class="nav-item"><img src="/image/menu-icon-7.png" alt=""></span>MORE</div>
    </nav>
  </aside>
  <div class="app">
    <main class="main">
      <section class="lesson-dashboard sticky">
        <nav class="lesson-tabs">
          <button class="lesson-tabs__item lesson-tabs__item--active">
            My Lesson
          </button>
          <button class="lesson-tabs__item">
            Classes
          </button>
        </nav>
        <div class="lesson-toolbar">
          <button class="lesson-month-select">
            <span class="calendar"><img src="/image/calendar.svg" alt=""></span>
            <a href="roro.html"><span class="lesson-month-select__label">March</span></a>
            <span><img src="/image/chevron-down.svg" alt=""></span>
          </button>
        </div>
        <article class="lesson-card lesson-card--today" style="--progress: 16%;">
          <div class="lesson-card__content">
            <h3 class="lesson-card__title">Day 3 · Today’s Lesson</h3>
            <div class="lesson-card__progress">
              <div class="lesson-card__progress-track">
                <div class="lesson-card__progress-fill"></div>
              </div>
            </div>
          </div>
          <div class="lesson-card__side">
            <div><img src="/image/list.svg" alt=""></div>
            <span class="lesson-card__count">1/6</span>
          </div>
        </article>
      </section>

      <div class="lesson-list">


      <!-- 7. Tori I -->
      <div class="lesson-list">
          <div class="divider"><span class="divider-text">7. Tori I</span>
          </div>


          

          
      </div>


      <!-- 8. Tori S -->
      <div class="lesson-list">
          <div class="divider"><span class="divider-text">8. Tori S</span>
          </div>


         

          
         

          
      </div>

      <!-- 9. Tori Ⅱ -->
      <div class="lesson-list">
          <div class="divider"><span class="divider-text">9. Tori Ⅱ</span>
          </div>


          


      </div>


      <!-- 10. Tori ⅡS -->
      <div class="lesson-list">
          <div class="divider"><span class="divider-text">10. Tori ⅡS</span>
          </div>


         





        </div> 
    </main>
    <aside class="right">
      <section class="profile-card">
        <div class="profile-head"><div class="avatar"><img src="https://wcfresource.a1edu.com/newsystem/image/character/maincharacter/robo_cleaner_09.png" alt="avatar"></div><div><div class="name">박은경</div><div class="level">Lv. 1A (19%)</div></div></div>
        <div class="stats"><div class="label"><span class="label-ico"><img src="/image/right-icon-1.png" alt=""></span>Books Read</div><div class="value">455</div><div class="label"><span class="label-ico"><img src="/image/right-icon-2.png" alt=""></span>Earned Points</div><div class="value">1623.1P</div><div class="label"><span class="label-ico"><img src="/image/right-icon-3.png" alt=""></span>To-Do</div><div class="value link">6</div><div class="label"><span class="label-ico"><img src="/image/right-icon-5.png" alt=""></span>Favorites</div><div class="value link">0</div></div>
      </section>
      <section class="calendar">
        <img src="image/cal.png" alt="">
      </section>
      <button class="logout">로그아웃</button>
    </aside>
  </div>
</body>
</html>
